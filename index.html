function reducer(s,a){
  switch(a.type){
    case"NAV":return{...s,view:a.view,modal:null};
    case"MODAL":return{...s,modal:a.modal};
    case"CLOSE_MODAL":return{...s,modal:null};
    case"UPDATE_SALDO":return{...s,rekeningen:s.rekeningen.map(r=>r.id===a.id?{...r,saldo:a.saldo}:r)};
    case"ADD_REKENING":return{...s,rekeningen:[...s.rekeningen,{...a.r,id:Date.now()}]};
    case"DEL_REKENING":return{...s,rekeningen:s.rekeningen.filter(r=>r.id!==a.id)};
    case"ADD_UITGAVE":{
      const u={...a.u,id:Date.now(),maand:nowMonth(),datum:vandaag()};
      const eerste=s.rekeningen.find(r=>r.type==="Bank");
      const rec=s.rekeningen.map(r=>r.id===eerste?.id?{...r,saldo:Math.max(0,r.saldo-u.bedrag)}:r);
      return{...s,uitgaven:[u,...s.uitgaven],rekeningen:rec,modal:null};
    }
    case"DEL_UITGAVE":return{...s,uitgaven:s.uitgaven.filter(u=>u.id!==a.id)};
    case"UPDATE_BUDGET":return{...s,budget:{...s.budget,...a.b}};
    case"ADD_VASTE":return{...s,vasteLasten:[...s.vasteLasten,{...a.v,id:Date.now()}],modal:null};
    case"UPDATE_VASTE":return{...s,vasteLasten:s.vasteLasten.map(v=>v.id===a.v.id?a.v:v),modal:null};
    case"TOGGLE_VASTE":return{...s,vasteLasten:s.vasteLasten.map(v=>v.id===a.id?{...v,actief:!v.actief}:v)};
    case"DEL_VASTE":return{...s,vasteLasten:s.vasteLasten.filter(v=>v.id!==a.id)};
    default:return s;
  }
}

// ── UITGAVEN ───────────────────────────────────────────────────────────────
function Uitgaven({state,dispatch}){
  const{uitgaven,categorieen,modal}=state;
  const[modus,setModus]=useState("ai");
  const[tekst,setTekst]=useState("");
  const[luisteren,setLuisteren]=useState(false);
  const[laden,setLaden]=useState(false);
  const[parsed,setParsed]=useState(null);
  const[fout,setFout]=useState("");
  const[hForm,setHForm]=useState({omschrijving:"",bedrag:"",categorie:"Eten",winkel:""});
  const recRef=useRef(null);
  const hm=nowMonth();
  const maandU=uitgaven.filter(u=>u.maand===hm);
  const totaal=maandU.reduce((a,u)=>a+u.bedrag,0);

  const lokaalParseer=t=>{
    const bm=t.match(/€\s*(\d+(?:[.,]\d{1,2})?)/i)||t.match(/(\d+(?:[.,]\d{1,2})?)\s*euro/i)||t.match(/(\d+(?:[.,]\d{2})?)/);
    if(!bm)return null;
    const bedrag=parseFloat(bm[1].replace(",","."));
    const winkelMatch=t.match(/bij\s+([A-Za-zÀ-ÿ\s]+?)(?:\s+in\s|\s+voor\s|[.,]|$)/i);
    const winkel=winkelMatch?winkelMatch[1].trim():"";
    const omschrijvingMatch=t.match(/aan\s+(?:een\s+)?(.+?)(?:\s+bij|\s+voor|[.,]|$)/i);
    const omschrijving=omschrijvingMatch?omschrijvingMatch[1].trim():t.slice(0,40);
    const tl=t.toLowerCase();
    let categorie="Overig";
    if(/broodje|lunch|pizza|restaurant|cafe|koffie|snack|eten|maaltijd|thuisbezorgd|damasco|bakker|sushi|burger/.test(tl))categorie="Uit eten";
    else if(/boodschap|supermarkt|albert|jumbo|lidl|aldi|ah|dirk|plus/.test(tl))categorie="Eten";
    else if(/benzine|tank|shell|bp|ns|trein|bus|ov|parkeer|taxi|uber/.test(tl))categorie="Transport";
    else if(/netflix|spotify|disney|youtube|abonnement/.test(tl))categorie="Abonnementen";
    else if(/shirt|schoenen|kleding|jas|broek|zara|h&m/.test(tl))categorie="Kleding";
    else if(/iphone|laptop|telefoon|samsung|apple|mediamarkt|coolblue/.test(tl))categorie="Elektronica";
    else if(/dokter|apotheek|medicijn|tandarts|zorg/.test(tl))categorie="Gezondheid";
    else if(/gym|sport|fitness|zwemmen|tennis/.test(tl))categorie="Sport";
    else if(/hotel|vliegtuig|vakantie|reis|airbnb/.test(tl))categorie="Reizen";
    else if(/kapper|nagel|schoonheid|parfum/.test(tl))categorie="Persoonlijke verzorging";
    return{bedrag,omschrijving:omschrijving.charAt(0).toUpperCase()+omschrijving.slice(1),categorie,winkel};
  };

  const startLuisteren=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setFout("Voice werkt alleen in Chrome/Edge of Safari iOS 15+.");return;}
    const rec=new SR();
    rec.lang="nl-NL";rec.continuous=false;rec.interimResults=true;
    rec.onresult=e=>setTekst(Array.from(e.results).map(r=>r[0].transcript).join(""));
    rec.onend=()=>setLuisteren(false);
    rec.onerror=()=>{setLuisteren(false);setFout("Microfoon niet beschikbaar.");};
    rec.start();recRef.current=rec;setLuisteren(true);setFout("");
  };

  const verwerk=async()=>{
    if(!tekst.trim())return;
    setLaden(true);setFout("");setParsed(null);
    const apiKey=localStorage.getItem("anthropic_key")||"";
    if(apiKey){
      try{
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
          headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","x-api-key":apiKey},
          body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:300,
            system:`Nederlandse financiële assistent. Extraheer uitgave. Categorieën: ${categorieen.join(", ")}. Alleen JSON: {"bedrag":0.00,"omschrijving":"...","categorie":"...","winkel":"..."}`,
            messages:[{role:"user",content:tekst}]})});
        const data=await res.json();
        const match=(data.content?.[0]?.text||"").match(/\{[\s\S]*\}/);
        if(match){setParsed(JSON.parse(match[0]));setLaden(false);return;}
      }catch(e){}
    }
    const lok=lokaalParseer(tekst);
    if(lok){setParsed(lok);if(!apiKey)setFout("💡 Lokaal herkend — geen API key.");}
    else setFout("Geen bedrag herkend. Probeer: 'Ik betaalde €15 bij de bakker'");
    setLaden(false);
  };

  return(<div style={{paddingBottom:20}}>
    <div style={{background:`linear-gradient(135deg,#FF6B35,#ff8c5a)`,padding:"50px 20px 20px",color:"#fff"}}>
      <div style={{fontSize:13,opacity:.8,marginBottom:4}}>{maandNaam(hm)}</div>
      <div style={{fontWeight:700,fontSize:22}}>Uitgaven</div>
      <div style={{fontFamily:"DM Mono",fontSize:28,fontWeight:700,marginTop:4}}>{fmtEur(totaal)}</div>
      <div style={{fontSize:12,opacity:.7,marginTop:2}}>{maandU.length} transacties deze maand</div>
    </div>

    <div style={{padding:"14px 16px"}}>
      {/* Tabs */}
      <div style={{display:"flex",background:"#fff",borderRadius:12,padding:4,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",marginBottom:14}}>
        {[["ai","🤖 AI invoer"],["handmatig","📝 Handmatig"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>{setModus(id);setFout("");setParsed(null);}}

                    <input value={key==="bedrag"?parsed[key]:parsed[key]||""} type={key==="bedrag"?"number":"text"}
                      onChange={e=>setParsed(p=>({...p,[key]:key==="bedrag"?parseFloat(e.target.value)||0:e.target.value}))}
                      style={inpS({padding:"10px 12px",fontSize:14})}/>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{dispatch({type:"ADD_UITGAVE",u:{omschrijving:parsed.omschrijving,categorie:parsed.categorie,winkel:parsed.winkel||"",bedrag:parsed.bedrag}});setParsed(null);setTekst("");}}
                  style={{flex:1,padding:"13px",border:"none",borderRadius:12,background:C.green,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                  ✅ Opslaan
                </button>
                <button onClick={()=>setParsed(null)} style={{padding:"13px 16px",border:"1px solid #E5E7EB",borderRadius:12,background:"#fff",cursor:"pointer",fontSize:14}}>✕</button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Handmatig */}
      {modus==="handmatig"&&(
        <div style={{background:"#fff",borderRadius:14,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",marginBottom:14}}>
          <Field label="Omschrijving"><input value={hForm.omschrijving} onChange={e=>setHForm(p=>({...p,omschrijving:e.target.value}))} placeholder="bijv. Boodschappen" style={inpS()}/></Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label="Bedrag (€)"><input type="number" value={hForm.bedrag} onChange={e=>setHForm(p=>({...p,bedrag:e.target.value}))} placeholder="0,00" style={inpS()}/></Field>
            <Field label="Categorie">
              <select value={hForm.categorie} onChange={e=>setHForm(p=>({...p,categorie:e.target.value}))} style={inpS()}>
                {categorieen.map(c=><option key={c}>{c}</option>)}
              </select>
            </Field>
          </div>
          <Field label="Winkel / locatie"><input value={hForm.winkel} onChange={e=>setHForm(p=>({...p,winkel:e.target.value}))} placeholder="bijv. Albert Heijn" style={inpS()}/></Field>
          <button onClick={()=>{
            if(!hForm.omschrijving||!hForm.bedrag)return;
            dispatch({type:"ADD_UITGAVE",u:{omschrijving:hForm.omschrijving,categorie:hForm.categorie,winkel:hForm.winkel,bedrag:parseFloat(hForm.bedrag)}});
            setHForm({omschrijving:"",bedrag:"",categorie:"Eten",winkel:""});
          }} disabled={!hForm.omschrijving||!hForm.bedrag}
            style={{width:"100%",padding:"14px",border:"none",borderRadius:12,background:C.orange,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",opacity:(!hForm.omschrijving||!hForm.bedrag)?.5:1}}>

      {uitgaven.length>0&&(
        <div>
          <div style={{fontWeight:600,fontSize:15,color:C.text,marginBottom:10}}>Alle uitgaven</div>
          <div style={{background:"#fff",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            {uitgaven.map((u,i)=>(
              <div key={u.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 15px",borderBottom:i<uitgaven.length-1?"1px solid #F3F4F6":"none"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:500,fontSize:14,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{u.omschrijving}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{u.categorie} · {u.datum}{u.winkel?` · ${u.winkel}`:""}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:10}}>
                  <div style={{fontFamily:"DM Mono",fontWeight:700,color:C.red,fontSize:14,whiteSpace:"nowrap"}}>-{fmtEur(u.bedrag)}</div>
                  <button onClick={()=>dispatch({type:"DEL_UITGAVE",id:u.id})} style={{width:28,height:28,borderRadius:"50%",border:"none",background:"#FEE2E2",color:C.red,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  </div>);
}

// ── VASTE LASTEN ───────────────────────────────────────────────────────────
function VasteLasten({state,dispatch}){
  const{vasteLasten,modal}=state;
  const[bewerkItem,setBewerkItem]=useState(null);
  const[showSheet,setShowSheet]=useState(false);
  const[form,setForm]=useState({naam:"",categorie:"Abonnementen",bedrag:"",dag:1});
  const totaal=vasteLasten.filter(v=>v.actief).reduce((a,v)=>a+v.bedrag,0);
  const catOpties=["Wonen","Abonnementen","Verzekering","Transport","Sport","Overig"];
  const catKleur={Wonen:C.blue,Abonnementen:C.orange,Verzekering:C.purple,Transport:C.green,Sport:C.yellow,Overig:C.muted};

  const openNieuw=()=>{setBewerkItem(null);setForm({naam:"",categorie:"Abonnementen",bedrag:"",dag:1});setShowSheet(true);};
  const openBewerk=v=>{setBewerkItem(v);setForm({naam:v.naam,categorie:v.categorie,bedrag:String(v.bedrag),dag:v.dag});setShowSheet(true);};
  const slaOp=()=>{
    if(!form.naam||!form.bedrag)return;
    if(bewerkItem)dispatch({type:"UPDATE_VASTE",v:{...bewerkItem,...form,bedrag:parseFloat(form.bedrag)}});
    else dispatch({type:"ADD_VASTE",v:{...form,bedrag:parseFloat(form.bedrag),actief:true}});
    setShowSheet(false);
  };

  return(<div style={{paddingBottom:20}}>
    <div style={{background:`linear-gradient(135deg,#FF6B35,#ff8c5a)`,padding:"50px 20px 20px",color:"#fff"}}>
      <div style={{fontSize:13,opacity:.8,marginBottom:4}}>Maandelijks</div>
      <div style={{fontWeight:700,fontSize:22}}>Vaste Lasten</div>
      <div style={{fontFamily:"DM Mono",fontSize:28,fontWeight:700,marginTop:4}}>{fmtEur(totaal)}</div>
      <div style={{fontSize:12,opacity:.7,marginTop:2}}>{vasteLasten.filter(v=>v.actief).length} actieve posten</div>
    </div>
    <div style={{padding:"14px 16px"}}>
      <button onClick={openNieuw}
        style={{width:"100%",padding:"14px",border:"none",borderRadius:12,background:C.orange,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:14}}>
        + Vaste last toevoegen
      </button>
      <div style={{background:"#fff",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        {vasteLasten.map((v,i)=>(
          <div key={v.id} style={{display:"flex",alignItems:"center",padding:"13px 15px",borderBottom:i<vasteLasten.length-1?"1px solid #F3F4F6":"none",opacity:v.actief?1:.45,transition:"opacity .2s"}}>
            <div style={{width:38,height:38,borderRadius:10,background:(catKleur[v.categorie]||C.muted)+"20",display:"flex",alignItems:"center",justifyContent:"center",marginRight:11,fontSize:16,flexShrink:0}}>
              {{Wonen:"🏠",Abonnementen:"📱",Verzekering:"🛡️",Transport:"🚗",Sport:"💪",Overig:"📌"}[v.categorie]||"📌"}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:14,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{v.naam}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:1}}>Dag {v.dag} · <span style={{color:catKleur[v.categorie]||C.muted}}>{v.categorie}</span></div>
            </div>
            <div style={{fontFamily:"DM Mono",fontWeight:700,color:C.red,fontSize:14,marginRight:10,whiteSpace:"nowrap"}}>{fmtEur(v.bedrag)}</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <button onClick={()=>openBewerk(v)} style={{width:30,height:30,borderRadius:8,border:"1px solid #E5E7EB",background:"#fff",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>✏️</button>
              <div onClick={()=>dispatch({type:"TOGGLE_VASTE",id:v.id})}
                style={{width:42,height:24,borderRadius:99,background:v.actief?C.green:"#D1D5DB",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
                <div style={{width:16,height:16,borderRadius:"50%",background:"#fff",position:"absolute",top:4,left:v.actief?22:4,transition:"left .2s"}}/>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
    {showSheet&&(
      <Sheet title={bewerkItem?"Bewerken":"Toevoegen"} onClose={()=>setShowSheet(false)}>
        <Field label="Naam"><input value={form.naam} onChange={e=>setForm(p=>({...p,naam:e.target.value}))} placeholder="bijv. Netflix" style={inpS()}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="Categorie"><select value={form.categorie} onChange={e=>setForm(p=>({...p,categorie:e.target.value}))} style={inpS()}>{catOpties.map(c=><option key={c}>{c}</option>)}</select></Field>
          <Field label="Bedrag (€)"><input type="number" value={form.bedrag} onChange={e=>setForm(p=>({...p,bedrag:e.target.value}))} placeholder="0.00" style={inpS()}/></Field>
        </div>
        <Field label="Dag van de maand"><input type="number" min={1} max={31} value={form.dag} onChange={e=>setForm(p=>({...p,dag:Number(e.target.value)}))} style={inpS()}/></Field>
        <button onClick={slaOp} style={{width:"100%",padding:"14px",border:"none",borderRadius:12,background:C.orange,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginTop:4}}>
          {bewerkItem?"Opslaan":"Toevoegen"}
        </button>
      </Sheet>
    )}
  </div>);
}

// ── BUDGET ─────────────────────────────────────────────────────────────────
function Budget({state,dispatch}){
  const{budget,uitgaven,historiek}=state;
  const[lok,setLok]=useState(budget);
  const hm=nowMonth();
  const uitgegeven=uitgaven.filter(u=>u.maand===hm).reduce((a,u)=>a+u.bedrag,0);
  const vrij=lok.inkomen-lok.vasteLasten-lok.sparen;
  const nogVrij=Math.max(0,vrij-uitgegeven);
  const vrijPct=Math.min(100,uitgegeven/Math.max(1,vrij)*100);

  return(<div style={{paddingBottom:20}}>
    <div style={{background:`linear-gradient(135deg,#FF6B35,#ff8c5a)`,padding:"50px 20px 20px",color:"#fff"}}>
      <div style={{fontSize:13,opacity:.8,marginBottom:4}}>{maandNaam(hm)}</div>
      <div style={{fontWeight:700,fontSize:22}}>Budget</div>
      <div style={{fontFamily:"DM Mono",fontSize:28,fontWeight:700,marginTop:4}}>{fmtEur(nogVrij)}</div>
      <div style={{fontSize:12,opacity:.7,marginTop:2}}>nog vrij te besteden</div>
    </div>
    <div style={{padding:"14px 16px"}}>
      {/* Voortgang */}
      <div style={{background:"#fff",borderRadius:14,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",marginBottom:14}}>
        <div style={{fontWeight:600,fontSize:15,color:C.text,marginBottom:12}}>Voortgang deze maand</div>
        <div style={{height:12,borderRadius:99,background:"#F3F4F6",overflow:"hidden",marginBottom:10}}>
          <div style={{height:"100%",width:`${vrijPct}%`,background:vrijPct>85?C.red:vrijPct>60?C.yellow:C.orange,borderRadius:99,transition:"width .8s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:C.muted}}>
          <span>Uitgegeven <b style={{color:C.red}}>{fmtEur(uitgegeven)}</b></span>
          <span>Budget <b style={{color:C.text}}>{fmtEur(vrij)}</b></span>
        </div>
        <div style={{height:6,borderRadius:99,overflow:"hidden",display:"flex",marginTop:14}}>
          <div style={{width:`${budget.vasteLasten/Math.max(1,budget.inkomen)*100}%`,background:C.red}}/>
          <div style={{width:`${budget.sparen/Math.max(1,budget.inkomen)*100}%`,background:C.blue}}/>
          <div style={{width:`${vrij/Math.max(1,budget.inkomen)*100}%`,background:C.orange}}/>
        </div>
        <div style={{display:"flex",gap:12,fontSize:11,color:C.muted,marginTop:6}}>
          <span><span style={{color:C.red}}>■</span> Vaste lasten</span>
          <span><span style={{color:C.blue}}>■</span> Sparen</span>
          <span><span style={{color:C.orange}}>■</span> Vrij</span>
        </div>
      </div>

      {/* Instellen */}
      <div style={{background:"#fff",borderRadius:14,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",marginBottom:14}}>
        <div style={{fontWeight:600,fontSize:15,color:C.text,marginBottom:14}}>Budget instellen</div>
        {[["Maandelijks inkomen","inkomen",C.green,"💰"],["Vaste lasten","vasteLasten",C.red,"🏠"],["Sparen","sparen",C.blue,"🐷"]].map(([lbl,key,kleur,ico])=>(
          <div key={key} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:600,color:C.muted}}>{ico} {lbl}</div>
              <div style={{fontFamily:"DM Mono",fontSize:13,color:kleur,fontWeight:600}}>{fmtEur(lok[key])}</div>
            </div>
            <input type="number" value={lok[key]} onChange={e=>setLok(p=>({...p,[key]:Number(e.target.value)}))} style={inpS()}/>
          </div>
        ))}
        <div style={{background:C.orangeLight,borderRadius:10,padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:12,color:C.muted}}>Vrij te besteden</div>
          <div style={{fontFamily:"DM Mono",fontSize:22,fontWeight:700,color:C.orange}}>{fmtEur(vrij)}</div>
        </div>
        <button onClick={()=>dispatch({type:"UPDATE_BUDGET",b:lok})}
          style={{width:"100%",padding:"14px",border:"none",borderRadius:12,background:C.orange,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>
          Opslaan
        </button>
      </div>

      {/* Historiek */}
      <div style={{fontWeight:600,fontSize:15,color:C.text,marginBottom:10}}>Maandhistoriek</div>
      {historiek.length===0?(
        <div style={{background:"#fff",borderRadius:14,padding:"28px 16px",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:28,marginBottom:8}}>📅</div>
          <div style={{fontWeight:600,color:C.text,marginBottom:4}}>Nog geen historiek</div>
          <div style={{fontSize:13,color:C.muted}}>Vult zich na de eerste maand</div>
        </div>
      ):(
        <div style={{background:"#fff",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
          {historiek.map((h,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 15px",borderBottom:i<historiek.length-1?"1px solid #F3F4F6":"none"}}>
              <div style={{fontSize:14,color:C.muted,minWidth:70}}>{maandNaam(h.maand)}</div>
              <div style={{flex:1,fontSize:12,color:C.muted,textAlign:"center"}}>vrij: {fmtEur(h.vrijGebruikt)}</div>
              <div style={{fontFamily:"DM Mono",fontWeight:700,color:h.overschot>=0?C.green:C.red,fontSize:14}}>{h.overschot>=0?"+":""}{fmtEur(h.overschot)}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  </div>);
}

            <span style={{fontSize:14,color:C.muted}}>{k}</span>
            <span style={{fontSize:14,color:C.text,fontWeight:500}}>{v}</span>
          </div>
        ))}
      </div>
    </div>
  </div>);
}

// ── Modals (saldo bewerken) ────────────────────────────────────────────────
function GlobalModals({state,dispatch}){
  const{modal}=state;
  if(!modal)return null;
  if(modal.type==="editSaldo"){
    const r=modal.rekening;
    const[val,setVal]=useState(String(r.saldo));
    return(<Sheet title={r.naam} onClose={()=>dispatch({type:"CLOSE_MODAL"})}>
      <div style={{fontSize:13,color:C.muted,marginBottom:12}}>Huidig saldo: <b style={{color:r.kleur}}>{fmtEur(r.saldo)}</b></div>
      <Field label="Nieuw saldo (€)">
        <input type="number" value={val} onChange={e=>setVal(e.target.value)} style={inpS({fontFamily:"DM Mono",fontSize:18,fontWeight:600})} autoFocus/>
      </Field>
      <button onClick={()=>{dispatch({type:"UPDATE_SALDO",id:r.id,saldo:parseFloat(val)||0});dispatch({type:"CLOSE_MODAL"});}}
        style={{width:"100%",padding:"14px",border:"none",borderRadius:12,background:C.orange,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>
        Saldo bijwerken
      </button>
    </Sheet>);
  }
  return null;
}

// ── NAV ICONS (SVG) ────────────────────────────────────────────────────────
const NavIco=({type,active})=>{
  const col=active?C.orange:"#9CA3AF";
  const paths={
    home:{d:"M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z M9 22V12h6v10"},
    uitgaven:{d:"M12 5v14M5 12h14"},
    lasten:{d:"M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"},
    budget:{d:"M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"},
    settings:{d:"M12 15a3 3 0 100-6 3 3 0 000 6z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"},
  };
  const p=paths[type];
  if(!p)return null;
  return(<svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    {p.d.split(" M").map((seg,i)=><path key={i} d={i===0?seg:"M"+seg}/>)}
  </svg>);
};

// ── ROOT ───────────────────────────────────────────────────────────────────
function App(){
  const[state,dispatch]=useReducer(reducer,INIT);
  const NAV=[
    {id:"home",label:"Home",icon:"home"},
    {id:"uitgaven",label:"Uitgaven",icon:"uitgaven"},
    {id:"vastelasten",label:"Lasten",icon:"lasten"},
    {id:"budget",label:"Budget",icon:"budget"},
    {id:"instellingen",label:"Meer",icon:"settings"},
  ];
  const renderPage=()=>{
    const p={state,dispatch};
    switch(state.view){
      case"home":return<Home {...p}/>;
      case"uitgaven":return<Uitgaven {...p}/>;
      case"vastelasten":return<VasteLasten {...p}/>;
      case"budget":return<Budget {...p}/>;
      case"instellingen":return<Instellingen {...p}/>;
      default:return<Home {...p}/>;
    }
  };

  // Safe area bottom voor iPhone
  const safeBottom=typeof window!=="undefined"&&window.screen?.height>800?34:0;

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",height:"100dvh",background:C.bg,overflow:"hidden"}}>
      {/* Scrollbaar content */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        {renderPage()}
      </div>

      {/* Bottom nav */}
      <div style={{background:"#fff",borderTop:"1px solid #E5E7EB",display:"flex",paddingBottom:safeBottom,boxShadow:"0 -2px 12px rgba(0,0,0,0.06)",flexShrink:0}}>
        {NAV.map(n=>{
          const active=n.id===state.view;
          return(
            <button key={n.id} onClick={()=>dispatch({type:"NAV",view:n.id})}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"10px 0 8px",border:"none",background:"transparent",cursor:"pointer",gap:4,transition:"opacity .15s",WebkitTapHighlightColor:"transparent"}}>
              <NavIco type={n.icon} active={active}/>
              <span style={{fontSize:10,fontWeight:active?700:500,color:active?C.orange:"#9CA3AF",letterSpacing:"0.01em"}}>{n.label}</span>
              {active&&<div style={{width:4,height:4,borderRadius:"50%",background:C.orange,marginTop:1}}/>}
            </button>
          );
        })}
      </div>

      {/* Globale modals */}
      <GlobalModals state={state} dispatch={dispatch}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
