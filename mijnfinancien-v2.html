function reducer(s,a){
  switch(a.type){
    case "SET_VIEW":return{...s,view:a.view};
    case "TOGGLE_DARK":return{...s,darkMode:!s.darkMode};
    case "UPDATE_SALDO":return{...s,rekeningen:s.rekeningen.map(r=>r.id===a.id?{...r,saldo:a.saldo}:r)};
    case "ADD_REKENING":return{...s,rekeningen:[...s.rekeningen,{...a.r,id:Date.now()}]};
    case "DEL_REKENING":return{...s,rekeningen:s.rekeningen.filter(r=>r.id!==a.id)};
    case "REORDER_REKENINGEN":return{...s,rekeningen:a.list};
    case "ADD_UITGAVE":{
      const u={...a.u,id:Date.now(),maand:nowMonth(),datum:vandaag()};
      const rec=s.rekeningen.map(r=>r.type==="Bank"&&r.id===s.rekeningen.find(x=>x.type==="Bank")?.id?{...r,saldo:Math.max(0,r.saldo-u.bedrag)}:r);
      return{...s,uitgaven:[u,...s.uitgaven],rekeningen:rec};
    }
    case "DEL_UITGAVE":return{...s,uitgaven:s.uitgaven.filter(u=>u.id!==a.id)};
    case "UPDATE_BUDGET":return{...s,budget:{...s.budget,...a.b}};
    case "ADD_VASTE":return{...s,vasteLasten:[...s.vasteLasten,{...a.v,id:Date.now()}]};
    case "UPDATE_VASTE":return{...s,vasteLasten:s.vasteLasten.map(v=>v.id===a.v.id?a.v:v)};
    case "TOGGLE_VASTE":return{...s,vasteLasten:s.vasteLasten.map(v=>v.id===a.id?{...v,actief:!v.actief}:v)};
    case "DEL_VASTE":return{...s,vasteLasten:s.vasteLasten.filter(v=>v.id!==a.id)};
    case "ADD_CATEGORIE":return{...s,categorieen:[...s.categorieen,a.naam]};
    case "DEL_HISTORIEK":return{...s,historiek:s.historiek.filter((_,i)=>i!==a.idx)};
    default:return s;
  }
}

function KpiCard({label,waarde,sub,accent,color,C}){
  const[hov,setHov]=useState(false);
  return(<div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{background:accent?"#1A0800":C.card,border:`1px solid ${accent?"transparent":C.border}`,borderRadius:8,padding:"16px 18px",flex:1,minWidth:0,
      boxShadow:hov?"0 4px 14px rgba(0,0,0,0.12)":"0 1px 3px rgba(0,0,0,0.06)",transform:hov?"translateY(-1px)":"none",transition:"all .2s"}}>
    <div style={{fontSize:11,fontWeight:500,color:accent?"rgba(255,107,53,0.7)":C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</div>
    <div style={{fontFamily:"DM Mono",fontSize:20,fontWeight:600,color:accent?C.orange:(color||C.text),marginBottom:sub?3:0}}>{waarde}</div>
    {sub&&<div style={{fontSize:11,color:accent?C.orange:C.muted}}>{sub}</div>}
  </div>);
}

function PageDashboard({state,dispatch,C}){

            <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,fontSize:12}}>
              <span style={{color:C.muted}}>{r.icoon} {r.naam}</span>
              <span style={{fontFamily:"DM Mono",fontWeight:600,color:C.text}}>{fmtEur(r.saldo)}</span>
              <span style={{fontSize:10,color:C.muted,background:C.bg,padding:"1px 5px",borderRadius:99}}>{Math.round(r.saldo/totaalNW*100)}%</span>

    </div>
  </div>);
}

// ══ REKENINGEN (met drag & drop) ═══════════════════════════════════════════
function PageRekeningen({state,dispatch,C}){
  const{rekeningen}=state;
  const[modal,setModal]=useState(false);
  const[bewerkId,setBewerkId]=useState(null);
  const[saldoEdit,setSaldoEdit]=useState({});
  const[form,setForm]=useState({naam:"",type:"Bank",saldo:"",kleur:"#FF6B35",icoon:"🏦"});
  const[dragId,setDragId]=useState(null);
  const[dragOver,setDragOver]=useState(null);
  const totaal=rekeningen.reduce((a,r)=>a+r.saldo,0);
  const types=["Bank","Spaar","Belegging","Crypto","Digitaal","Cash"];
  const iconen=["🏦","💰","📈","₿","💳","💵","🏧","💎","📊","🔗","✈️","🏊"];
  const kleuren=["#FF6B35","#10B981","#3B82F6","#F59E0B","#8B5CF6","#6B7280","#EF4444","#EC4899","#60A5FA","#34D399","#A78BFA","#2DD4BF"];

  const slaOp=()=>{
    if(!form.naam||!form.saldo)return;
    dispatch({type:"ADD_REKENING",r:{...form,saldo:parseFloat(form.saldo)}});
    setModal(false);setForm({naam:"",type:"Bank",saldo:"",kleur:"#FF6B35",icoon:"🏦"});
  };
  const updateSaldo=id=>{
    const v=parseFloat(saldoEdit[id]);
    if(!isNaN(v))dispatch({type:"UPDATE_SALDO",id,saldo:v});
    setBewerkId(null);
  };

  // Drag handlers
  const onDragStart=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";};
  const onDragOver=(e,id)=>{e.preventDefault();setDragOver(id);};
  const onDrop=(e,targetId)=>{
    e.preventDefault();
    if(dragId===targetId){setDragId(null);setDragOver(null);return;}
    const list=[...rekeningen];
    const fromIdx=list.findIndex(r=>r.id===dragId);
    const toIdx=list.findIndex(r=>r.id===targetId);
    const [moved]=list.splice(fromIdx,1);
    list.splice(toIdx,0,moved);
    dispatch({type:"REORDER_REKENINGEN",list});
    setDragId(null);setDragOver(null);
  };
  const onDragEnd=()=>{setDragId(null);setDragOver(null);};

  return(<div style={{animation:"fadeIn .3s ease-out"}}>

    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 24px",marginBottom:18,textAlign:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Totaal Netto Vermogen</div>
      <div style={{fontFamily:"DM Mono",fontSize:44,fontWeight:700,color:C.orange}}>{fmtEur(totaal)}</div>
      <div style={{height:8,borderRadius:99,background:C.border,overflow:"hidden",display:"flex",marginTop:14}}>
        {rekeningen.map(r=><div key={r.id} style={{width:`${r.saldo/totaal*100}%`,background:r.kleur,transition:"width .8s"}} title={r.naam}/>)}
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12}}>
      {rekeningen.map(r=>(
        <div key={r.id}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontSize:20,cursor:"grab"}}>{r.icoon}</div>
              <div>
                <div style={{fontWeight:600,color:C.text,fontSize:13,lineHeight:1.3}}>{r.naam}</div>
                <div style={{fontSize:11,color:C.muted}}>{r.type}</div>

            </div>

            <div onClick={()=>{setBewerkId(r.id);setSaldoEdit(p=>({...p,[r.id]:r.saldo}));}} style={{cursor:"pointer",display:"flex",alignItems:"baseline",gap:5}}>

      <Field label="Huidig saldo (€)" C={C}><input type="number" value={form.saldo} onChange={e=>setForm(p=>({...p,saldo:e.target.value}))} placeholder="0.00" style={inp(C)}/></Field>
      <Field label="Icoon" C={C}><div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{iconen.map(ic=><button key={ic} onClick={()=>setForm(p=>({...p,icoon:ic}))} style={{fontSize:18,padding:5,border:`2px solid ${form.icoon===ic?C.orange:C.border}`,borderRadius:6,background:form.icoon===ic?C.orangeLight:"transparent",cursor:"pointer"}}>{ic}</button>)}</div></Field>
      <Field label="Kleur" C={C}><div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{kleuren.map(kl=><div key={kl} onClick={()=>setForm(p=>({...p,kleur:kl}))} style={{width:26,height:26,borderRadius:"50%",background:kl,cursor:"pointer",border:`3px solid ${form.kleur===kl?"#0A0E1A":"transparent"}`}}/>)}</div></Field>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:10}}>
        <button onClick={()=>setModal(false)} style={{padding:"8px 16px",border:`1px solid ${C.border}`,borderRadius:7,background:"transparent",color:C.text,cursor:"pointer",fontWeight:500}}>Annuleren</button>
        <button onClick={slaOp} style={{padding:"8px 18px",border:"none",borderRadius:7,background:C.orange,color:"#fff",cursor:"pointer",fontWeight:600}}>Toevoegen</button>

// ══ UITGAVEN (AI + Handmatig formulier) ════════════════════════════════════
function PageUitgaven({state,dispatch,C}){
  const{uitgaven,categorieen}=state;
  const[modus,setModus]=useState("ai"); // "ai" | "handmatig"
  const[tekst,setTekst]=useState("");
  const[luisteren,setLuisteren]=useState(false);
  const[laden,setLaden]=useState(false);
  const[parsed,setParsed]=useState(null);
  const[fout,setFout]=useState("");
  const[zoek,setZoek]=useState("");
  const[catFilter,setCatFilter]=useState("Alle");
  const[nieuweCat,setNieuweCat]=useState("");
  const[toonCatForm,setToonCatForm]=useState(false);
  const recRef=useRef(null);
  // Handmatig formulier
  const[hForm,setHForm]=useState({omschrijving:"",bedrag:"",categorie:"Eten",winkel:"",datum:vandaag()});

  const gefilterd=uitgaven.filter(u=>{
    const z=zoek.toLowerCase();
    return(!z||u.omschrijving.toLowerCase().includes(z)||u.winkel?.toLowerCase().includes(z))&&(catFilter==="Alle"||u.categorie===catFilter);
  }).sort((a,b)=>b.datum.localeCompare(a.datum));

  const startLuisteren=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setFout("Voice niet beschikbaar. Gebruik Chrome of Edge.");return;}
    const rec=new SR();
    rec.lang="nl-NL";rec.continuous=false;rec.interimResults=true;
    rec.onresult=e=>{const t=Array.from(e.results).map(r=>r[0].transcript).join("");setTekst(t);};
    rec.onend=()=>setLuisteren(false);
    rec.onerror=()=>{setLuisteren(false);setFout("Microfoon niet toegankelijk.");};
    rec.start();recRef.current=rec;setLuisteren(true);setFout("");
  };
  const stopLuisteren=()=>{recRef.current?.stop();setLuisteren(false);};

  // Slimme lokale parser als fallback
  const lokaalParseer=(t)=>{
    // Bedrag: €11, €11,50, 11 euro, 11.50 euro
    const bedragMatch=t.match(/€\s*(\d+(?:[.,]\d{1,2})?)/i)||t.match(/(\d+(?:[.,]\d{1,2})?)\s*euro/i)||t.match(/(\d+(?:[.,]\d{2})?)/);
    if(!bedragMatch)return null;
    const bedrag=parseFloat(bedragMatch[1].replace(",","."));

    // Winkel: "bij X in" of "bij X"
    const winkelMatch=t.match(/bij\s+([A-Za-zÀ-ÿ\s]+?)(?:\s+in\s|\s+voor\s|$)/i);
    const winkel=winkelMatch?winkelMatch[1].trim():"";

    // Stad (na "in")
    const stadMatch=t.match(/\bin\s+([A-Za-zÀ-ÿ]+)/i);

    // Omschrijving: alles na "aan een/een" of na "voor"
    const omschrijvingMatch=t.match(/aan\s+(?:een\s+)?(.+?)(?:\s+bij|\s+voor|$)/i)||t.match(/voor\s+(.+?)(?:\s+bij|$)/i);
    const omschrijving=omschrijvingMatch?omschrijvingMatch[1].trim():t.slice(0,40);

    // Categorie op basis van sleutelwoorden
    const tLow=t.toLowerCase();
    let categorie="Overig";
    if(/broodje|lunch|pizza|sushi|restaurant|cafe|koffie|snack|eten|maaltijd|besteld|thuisbezorgd|domino|mcdonalds|burger|sandwich|bakker|damasco/.test(tLow)) categorie="Uit eten";
    else if(/boodschap|supermarkt|albert|jumbo|lidl|aldi|ah|dirk|plus|groente|fruit/.test(tLow)) categorie="Eten";
    else if(/benzine|tank|shell|bp|total|ns|trein|bus|ov|parkeer|tram|taxi|uber/.test(tLow)) categorie="Transport";
    else if(/netflix|spotify|disney|youtube|abonnement|subscription/.test(tLow)) categorie="Abonnementen";
    else if(/shirt|schoenen|kleding|jas|broek|zara|h&m|primark/.test(tLow)) categorie="Kleding";
    else if(/iphone|laptop|telefoon|samsung|apple|mediamarkt|coolblue|computer|gadget/.test(tLow)) categorie="Elektronica";
    else if(/dokter|apotheek|medicijn|tandarts|zorg|gezondheid/.test(tLow)) categorie="Gezondheid";
    else if(/gym|sport|fitness|zwemmen|tennis|voetbal/.test(tLow)) categorie="Sport";
    else if(/hotel|vliegtuig|vakantie|reis|booking|airbnb/.test(tLow)) categorie="Reizen";
    else if(/cadeau|verjaardag|gift/.test(tLow)) categorie="Cadeaus";
    else if(/kapper|nagel|schoonheid|parfum/.test(tLow)) categorie="Persoonlijke verzorging";
    else if(/huur|gas|water|elektra|internet|energie/.test(tLow)) categorie="Wonen";

    return{bedrag,omschrijving:omschrijving.charAt(0).toUpperCase()+omschrijving.slice(1),categorie,winkel};
  };

  const verwerk=async()=>{
    if(!tekst.trim())return;
    setLaden(true);setFout("");setParsed(null);
    const apiKey=localStorage.getItem("anthropic_key")||"";

    if(apiKey){
      // Probeer met AI
      try{
        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","x-api-key":apiKey},
          body:JSON.stringify({
            model:"claude-sonnet-4-5",max_tokens:300,
            system:`Je bent een Nederlandse financiële assistent. Analyseer de tekst en extraheer de uitgave. Kies de categorie uit: ${categorieen.join(", ")}. Antwoord ALLEEN met geldige JSON, geen uitleg: {"bedrag":45.00,"omschrijving":"korte omschrijving","categorie":"Eten","winkel":"winkelnaam of leeg"}`,
            messages:[{role:"user",content:tekst}]
          })
        });
        const data=await res.json();
        const txt=data.content?.[0]?.text||"";
        const match=txt.match(/\{[\s\S]*\}/);
        if(match){setParsed(JSON.parse(match[0]));setLaden(false);return;}
      }catch(e){}
    }

    // Altijd lokale fallback proberen
    const lokaal=lokaalParseer(tekst);
    if(lokaal){
      setParsed(lokaal);
      if(!apiKey) setFout("💡 Geen API key — tekst lokaal herkend. Controleer de gegevens hieronder.");
    } else {
      setFout("Kon geen bedrag herkennen. Probeer: \"Ik heb €15 betaald bij de bakker\" of gebruik het Handmatig formulier.");
    }
    setLaden(false);
  };

  const bevestig=()=>{
    if(!parsed)return;
    dispatch({type:"ADD_UITGAVE",u:{omschrijving:parsed.omschrijving,categorie:parsed.categorie,winkel:parsed.winkel||"",bedrag:parsed.bedrag}});
    setParsed(null);setTekst("");setFout("");
  };

  const slaHandmatigOp=()=>{
    if(!hForm.omschrijving||!hForm.bedrag)return;
    dispatch({type:"ADD_UITGAVE",u:{omschrijving:hForm.omschrijving,categorie:hForm.categorie,winkel:hForm.winkel,bedrag:parseFloat(hForm.bedrag)}});
    setHForm({omschrijving:"",bedrag:"",categorie:"Eten",winkel:"",datum:vandaag()});
  };

  const voegCatToe=()=>{
    if(nieuweCat.trim()&&!categorieen.includes(nieuweCat.trim())){dispatch({type:"ADD_CATEGORIE",naam:nieuweCat.trim()});setNieuweCat("");setToonCatForm(false);}
  };

  const tabBtn=(id,label)=>(
    <button onClick={()=>setModus(id)} style={{padding:"8px 18px",border:"none",borderRadius:7,fontWeight:600,fontSize:13,cursor:"pointer",background:modus===id?C.orange:"transparent",color:modus===id?"#fff":C.muted,transition:"all .15s"}}>{label}</button>
  );

  return(<div style={{animation:"fadeIn .3s ease-out"}}>
    <div style={{fontWeight:700,fontSize:20,color:C.text,marginBottom:4}}>Uitgaven invoeren</div>
    <div style={{fontSize:12,color:C.muted,marginBottom:18}}>Voeg een uitgave toe via AI of handmatig formulier</div>

    {/* Invoer kaart */}
    <div style={{background:C.card,border:`2px solid ${C.orange}`,borderRadius:12,padding:20,marginBottom:18,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      {/* Tabs */}
      <div style={{display:"flex",gap:4,background:C.bg,borderRadius:8,padding:4,marginBottom:18,width:"fit-content"}}>
        {tabBtn("ai","🤖 AI invoer")}
        {tabBtn("handmatig","📝 Handmatig")}
      </div>

      {modus==="ai"&&(<>
        <div style={{position:"relative",marginBottom:10}}>
          <textarea value={tekst} onChange={e=>setTekst(e.target.value)}
            placeholder='Typ bijv: "Ik heb €52 betaald bij de Albert Heijn voor boodschappen" of druk op 🎤'
            style={{...inp(C),minHeight:72,resize:"vertical",paddingRight:50,lineHeight:1.5}}/>
          <button onClick={luisteren?stopLuisteren:startLuisteren}
            style={{position:"absolute",right:10,top:10,width:34,height:34,borderRadius:"50%",border:"none",background:luisteren?C.red:C.orange,color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ico d={IC.mic} size={15} color="#fff"/>
          </button>
        </div>
        {luisteren&&<div style={{fontSize:12,color:C.red,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:8,height:8,borderRadius:"50%",background:C.red,display:"inline-block",animation:"pulse 1s infinite"}}/>
          Aan het luisteren...
        </div>}
        {fout&&<div style={{fontSize:12,color:C.red,marginBottom:8,padding:"7px 11px",background:C.red+"15",borderRadius:6}}>{fout}</div>}
        <button onClick={verwerk} disabled={!tekst.trim()||laden}
          style={{padding:"8px 18px",border:"none",borderRadius:7,background:C.orange,color:"#fff",cursor:laden?"not-allowed":"pointer",fontWeight:600,opacity:laden?.7:1}}>
          {laden?"Verwerken...":"✨ Verwerken met AI"}
        </button>
        {parsed&&(
          <div style={{marginTop:14,background:C.green+"15",border:`1px solid ${C.green}`,borderRadius:8,padding:14}}>
            <div style={{fontWeight:600,color:C.green,marginBottom:10,fontSize:13}}>✅ Herkend — controleer en bevestig:</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              {[["Bedrag","bedrag"],["Omschrijving","omschrijving"],["Categorie","categorie"],["Winkel","winkel"]].map(([lbl,key])=>(
                <div key={key}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:3,textTransform:"uppercase"}}>{lbl}</div>
                  <input value={key==="bedrag"?parsed[key]:parsed[key]||""} type={key==="bedrag"?"number":"text"}
                    onChange={e=>setParsed(p=>({...p,[key]:key==="bedrag"?parseFloat(e.target.value)||0:e.target.value}))}
                    style={inp(C,{fontFamily:key==="bedrag"?"DM Mono":"inherit"})}/>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={bevestig} style={{padding:"8px 18px",border:"none",borderRadius:7,background:C.green,color:"#fff",cursor:"pointer",fontWeight:600}}>✅ Opslaan</button>
              <button onClick={()=>setParsed(null)} style={{padding:"8px 14px",border:`1px solid ${C.border}`,borderRadius:7,background:"transparent",color:C.text,cursor:"pointer"}}>Annuleren</button>
            </div>
          </div>
        )}
      </>)}

      {modus==="handmatig"&&(<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <Field label="Omschrijving" C={C}><input value={hForm.omschrijving} onChange={e=>setHForm(p=>({...p,omschrijving:e.target.value}))} placeholder="bijv. Boodschappen" style={inp(C)}/></Field>
          <Field label="Bedrag (€)" C={C}><input type="number" value={hForm.bedrag} onChange={e=>setHForm(p=>({...p,bedrag:e.target.value}))} placeholder="0,00" style={inp(C)}/></Field>
          <Field label="Categorie" C={C}>
            <select value={hForm.categorie} onChange={e=>setHForm(p=>({...p,categorie:e.target.value}))} style={inp(C)}>
              {categorieen.map(c=><option key={c}>{c}</option>)}
            </select>
          </Field>
          <Field label="Winkel / locatie" C={C}><input value={hForm.winkel} onChange={e=>setHForm(p=>({...p,winkel:e.target.value}))} placeholder="bijv. Albert Heijn" style={inp(C)}/></Field>
        </div>
        <button onClick={slaHandmatigOp} disabled={!hForm.omschrijving||!hForm.bedrag}
          style={{padding:"9px 20px",border:"none",borderRadius:7,background:C.orange,color:"#fff",cursor:"pointer",fontWeight:600,opacity:(!hForm.omschrijving||!hForm.bedrag)?.5:1}}>
          + Uitgave toevoegen
        </button>
      </>)}
    </div>

    {/* Filters + tabel */}
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{position:"relative",flex:1,minWidth:140}}>
          <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><Ico d={IC.search} size={13} color={C.muted}/></span>
          <input value={zoek} onChange={e=>setZoek(e.target.value)} placeholder="Zoeken..." style={inp(C,{paddingLeft:30})}/>
        </div>
        <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} style={inp(C,{width:"auto"})}>
          <option>Alle</option>{categorieen.map(c=><option key={c}>{c}</option>)}
        </select>
        {toonCatForm?(
          <div style={{display:"flex",gap:6}}>
            <input value={nieuweCat} onChange={e=>setNieuweCat(e.target.value)} placeholder="Nieuwe categorie" style={inp(C,{width:140})}/>
            <button onClick={voegCatToe} style={{padding:"6px 11px",border:"none",borderRadius:6,background:C.orange,color:"#fff",cursor:"pointer",fontWeight:600}}>+</button>
            <button onClick={()=>setToonCatForm(false)} style={{padding:"6px 9px",border:`1px solid ${C.border}`,borderRadius:6,background:"transparent",cursor:"pointer"}}><Ico d={IC.x} size={12} color={C.muted}/></button>
          </div>
        ):(
          <button onClick={()=>setToonCatForm(true)} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 11px",border:`1px solid ${C.border}`,borderRadius:7,background:"transparent",color:C.muted,cursor:"pointer",fontSize:12,whiteSpace:"nowrap"}}>
            <Ico d={IC.plus} size={12} color={C.muted}/> Categorie
          </button>
        )}
      </div>
      {gefilterd.length===0?(
        <div style={{padding:"36px",textAlign:"center",color:C.muted}}>
          <div style={{fontSize:28,marginBottom:8}}>📭</div>
          <div style={{fontWeight:600,color:C.text,marginBottom:4}}>Geen uitgaven</div>
          <div style={{fontSize:13}}>Voeg je eerste uitgave toe hierboven</div>
        </div>
      ):(
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:480}}>
            <thead>
              <tr style={{background:C.tableHead}}>
                {["Datum","Omschrijving","Categorie","Winkel","Bedrag",""].map(h=>(
                  <th key={h} style={{padding:"9px 13px",textAlign:"left",fontWeight:600,fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.04em",borderBottom:`1px solid ${C.border}`}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {gefilterd.map(u=>(
                <tr key={u.id} style={{borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:"10px 13px",fontFamily:"DM Mono",fontSize:11,color:C.muted}}>{u.datum}</td>
                  <td style={{padding:"10px 13px",fontWeight:500,color:C.text}}>{u.omschrijving}</td>
                  <td style={{padding:"10px 13px"}}><span style={{fontSize:11,padding:"2px 7px",borderRadius:99,background:C.orangeLight,color:C.orange,fontWeight:500}}>{u.categorie}</span></td>
                  <td style={{padding:"10px 13px",color:C.muted,fontSize:12}}>{u.winkel||"—"}</td>
                  <td style={{padding:"10px 13px",fontFamily:"DM Mono",fontWeight:600,color:C.red}}>-{fmtEur(u.bedrag)}</td>
                  <td style={{padding:"10px 13px"}}>
                    <button onClick={()=>dispatch({type:"DEL_UITGAVE",id:u.id})} style={{padding:3,border:"none",background:"transparent",cursor:"pointer",opacity:.5}}><Ico d={IC.trash} size={13} color={C.red}/></button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  </div>);
}

// ══ VASTE LASTEN (met bewerken per item) ═══════════════════════════════════
function PageVasteLasten({state,dispatch,C}){
  const{vasteLasten}=state;
  const[modal,setModal]=useState(false);
  const[bewerkItem,setBewerkItem]=useState(null); // item dat bewerkt wordt
  const[form,setForm]=useState({naam:"",categorie:"Abonnementen",bedrag:"",dag:1,actief:true});
  const totaal=vasteLasten.filter(v=>v.actief).reduce((a,v)=>a+v.bedrag,0);
  const catOpties=["Wonen","Abonnementen","Verzekering","Transport","Sport","Overig"];
  const catKleur={Wonen:L.blue,Abonnementen:L.orange,Verzekering:L.purple,Transport:L.green,Sport:L.yellow,Overig:L.muted};

  const slaOp=()=>{
    if(!form.naam||!form.bedrag)return;
    if(bewerkItem){
      dispatch({type:"UPDATE_VASTE",v:{...bewerkItem,...form,bedrag:parseFloat(form.bedrag)}});
      setBewerkItem(null);
    } else {
      dispatch({type:"ADD_VASTE",v:{...form,bedrag:parseFloat(form.bedrag)}});
    }
    setModal(false);
    setForm({naam:"",categorie:"Abonnementen",bedrag:"",dag:1,actief:true});
  };

  const openBewerk=(v)=>{
    setBewerkItem(v);
    setForm({naam:v.naam,categorie:v.categorie,bedrag:String(v.bedrag),dag:v.dag,actief:v.actief});
    setModal(true);
  };

  const openNieuw=()=>{
    setBewerkItem(null);
    setForm({naam:"",categorie:"Abonnementen",bedrag:"",dag:1,actief:true});
    setModal(true);
  };

  return(<div style={{animation:"fadeIn .3s ease-out"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <div>
        <div style={{fontWeight:700,fontSize:20,color:C.text}}>Vaste Lasten</div>
        <div style={{fontSize:12,color:C.muted,marginTop:2}}>Beheer je maandelijkse abonnementen en vaste kosten</div>
      </div>
      <button onClick={openNieuw} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",border:"none",borderRadius:7,background:C.orange,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:13}}>
        <Ico d={IC.plus} size={14} color="#fff"/> Toevoegen
      </button>
    </div>
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"16px 22px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      <div>
        <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Totaal per maand</div>
        <div style={{fontFamily:"DM Mono",fontSize:34,fontWeight:700,color:C.red}}>{fmtEur(totaal)}</div>
      </div>
      <div style={{fontSize:13,color:C.muted,textAlign:"right"}}>
        <div>{vasteLasten.filter(v=>v.actief).length} actief</div>
        <div>{vasteLasten.filter(v=>!v.actief).length} inactief</div>
      </div>
    </div>
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      {vasteLasten.map((v,i)=>(
        <div key={v.id} style={{display:"flex",alignItems:"center",padding:"13px 18px",borderBottom:i<vasteLasten.length-1?`1px solid ${C.border}`:"none",opacity:v.actief?1:.5,transition:"opacity .2s"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:2,flexWrap:"wrap"}}>
              <div style={{fontWeight:600,color:C.text,fontSize:13}}>{v.naam}</div>
              <span style={{fontSize:10,padding:"1px 6px",borderRadius:99,background:(catKleur[v.categorie]||L.muted)+"20",color:catKleur[v.categorie]||L.muted,fontWeight:600,whiteSpace:"nowrap"}}>{v.categorie}</span>
            </div>
            <div style={{fontSize:11,color:C.muted}}>Dag {v.dag} van de maand</div>
          </div>
          <div style={{fontFamily:"DM Mono",fontSize:16,fontWeight:700,color:C.red,marginRight:16,whiteSpace:"nowrap"}}>{fmtEur(v.bedrag)}</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {/* Bewerk knop */}
            <button onClick={()=>openBewerk(v)} style={{padding:"4px 8px",border:`1px solid ${C.border}`,borderRadius:6,background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:11,color:C.muted}}>
              <Ico d={IC.edit} size={12} color={C.muted}/>
            </button>
            {/* Toggle */}
            <div onClick={()=>dispatch({type:"TOGGLE_VASTE",id:v.id})}
              style={{width:34,height:19,borderRadius:99,background:v.actief?C.green:"#D1D5DB",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
              <div style={{width:13,height:13,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:v.actief?18:3,transition:"left .2s"}}/>
            </div>
            <button onClick={()=>dispatch({type:"DEL_VASTE",id:v.id})} style={{padding:3,border:"none",background:"transparent",cursor:"pointer",opacity:.5}}><Ico d={IC.trash} size={13} color={C.red}/></button>
          </div>
        </div>
      ))}
    </div>
    {modal&&(
      <Modal title={bewerkItem?"Vaste last bewerken":"Vaste last toevoegen"} onClose={()=>{setModal(false);setBewerkItem(null);}} C={C}>
        <Field label="Naam" C={C}><input value={form.naam} onChange={e=>setForm(p=>({...p,naam:e.target.value}))} placeholder="bijv. Netflix" style={inp(C)}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="Categorie" C={C}>
            <select value={form.categorie} onChange={e=>setForm(p=>({...p,categorie:e.target.value}))} style={inp(C)}>
              {catOpties.map(c=><option key={c}>{c}</option>)}
            </select>
          </Field>
          <Field label="Bedrag (€)" C={C}><input type="number" value={form.bedrag} onChange={e=>setForm(p=>({...p,bedrag:e.target.value}))} placeholder="0.00" style={inp(C)}/></Field>
        </div>
        <Field label="Dag van de maand" C={C}><input type="number" min={1} max={31} value={form.dag} onChange={e=>setForm(p=>({...p,dag:Number(e.target.value)}))} style={inp(C)}/></Field>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:10}}>
          <button onClick={()=>{setModal(false);setBewerkItem(null);}} style={{padding:"8px 16px",border:`1px solid ${C.border}`,borderRadius:7,background:"transparent",color:C.text,cursor:"pointer",fontWeight:500}}>Annuleren</button>
          <button onClick={slaOp} style={{padding:"8px 18px",border:"none",borderRadius:7,background:C.orange,color:"#fff",cursor:"pointer",fontWeight:600}}>{bewerkItem?"Opslaan":"Toevoegen"}</button>
        </div>
      </Modal>
    )}
  </div>);
}

// ══ INSTELLINGEN ════════════════════════════════════════════════════════════
function PageInstellingen({state,dispatch,C}){
  const[opgeslagen,setOpgeslagen]=useState(false);
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("anthropic_key")||"");
  const[toonKey,setToonKey]=useState(false);
  const[keyOk,setKeyOk]=useState(false);
  const sla=()=>{setOpgeslagen(true);setTimeout(()=>setOpgeslagen(false),2000);};
  const slaKey=()=>{localStorage.setItem("anthropic_key",apiKey.trim());setKeyOk(true);setTimeout(()=>setKeyOk(false),2000);};
  const verwijderKey=()=>{localStorage.removeItem("anthropic_key");setApiKey("");};
  const geldig=apiKey.startsWith("sk-ant-");
  const s=inp(C);
  return(<div style={{animation:"fadeIn .3s ease-out",maxWidth:600}}>
    <div style={{fontWeight:700,fontSize:20,color:C.text,marginBottom:4}}>Instellingen</div>
    <div style={{fontSize:12,color:C.muted,marginBottom:20}}>Beheer je account en voorkeuren</div>
    {/* API Key */}
    <div style={{background:C.card,border:`2px solid ${geldig?C.green:C.orange}`,borderRadius:8,marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      <div style={{padding:"13px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontWeight:600,fontSize:14,color:C.text}}>🔑 Anthropic API Key</div>
        {geldig?<span style={{fontSize:11,padding:"2px 8px",borderRadius:99,background:"#D1FAE5",color:C.green,fontWeight:600}}>✓ Actief</span>
               :<span style={{fontSize:11,padding:"2px 8px",borderRadius:99,background:"#FEF3C7",color:"#D97706",fontWeight:600}}>Niet ingesteld</span>}
      </div>
      <div style={{padding:"16px 18px"}}>
        <div style={{fontSize:13,color:C.muted,marginBottom:10}}>
          Vereist voor AI-invoer. Haal je key op via{" "}
          <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:C.orange,fontWeight:600}}>console.anthropic.com</a>
          {" "}→ API Keys → Create Key.
        </div>
        <div style={{position:"relative",marginBottom:10}}>
          <input type={toonKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-api03-..." style={{...s,fontFamily:"DM Mono",fontSize:13,paddingRight:90}}/>
          <button onClick={()=>setToonKey(t=>!t)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",border:"none",background:"transparent",color:C.muted,cursor:"pointer",fontSize:12,fontWeight:500}}>{toonKey?"Verbergen":"Tonen"}</button>
        </div>
        {apiKey&&!geldig&&<div style={{fontSize:12,color:C.red,marginBottom:10,padding:"6px 10px",background:C.red+"15",borderRadius:6}}>⚠️ Ongeldige key — moet beginnen met <span style={{fontFamily:"DM Mono"}}>sk-ant-</span></div>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={slaKey} disabled={!apiKey.trim()} style={{padding:"7px 16px",border:"none",borderRadius:7,background:keyOk?C.green:C.orange,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:13,transition:"background .3s",display:"flex",alignItems:"center",gap:5,opacity:!apiKey.trim()?.5:1}}>
            {keyOk&&<Ico d={IC.check} size={13} color="#fff"/>}{keyOk?"Opgeslagen!":"Key opslaan"}
          </button>
          {apiKey&&<button onClick={verwijderKey} style={{padding:"7px 13px",border:`1px solid ${C.red}40`,borderRadius:7,background:C.red+"10",color:C.red,cursor:"pointer",fontWeight:500,fontSize:13}}>Verwijderen</button>}
        </div>
        <div style={{fontSize:11,color:C.muted,marginTop:8}}>🔒 Lokaal opgeslagen in je browser — nooit gedeeld.</div>
      </div>
    </div>
    {[
      {titel:"Profiel",content:<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Field label="Naam" C={C}><input defaultValue="Anthony" style={s}/></Field>
        <Field label="Valuta" C={C}><select style={s}><option>EUR</option><option>USD</option><option>GBP</option></select></Field>
      </div>},
      {titel:"Weergave",content:<div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontWeight:500,color:C.text,marginBottom:2}}>Dark Mode</div>
          <div style={{fontSize:12,color:C.muted}}>Schakel tussen licht en donker thema</div>
        </div>
        <div onClick={()=>dispatch({type:"TOGGLE_DARK"})} style={{width:44,height:24,borderRadius:99,background:state.darkMode?C.orange:"#D1D5DB",cursor:"pointer",position:"relative",transition:"background .2s"}}>
          <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:state.darkMode?23:3,transition:"left .2s"}}/>
        </div>
      </div>},
      {titel:"Categorieën",content:<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {state.categorieen.map(c=><span key={c} style={{fontSize:12,padding:"3px 9px",borderRadius:99,background:C.orangeLight,color:C.orange,fontWeight:500}}>{c}</span>)}
      </div>},
    ].map(({titel,content})=>(
      <div key={titel} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{padding:"13px 18px",borderBottom:`1px solid ${C.border}`,fontWeight:600,fontSize:14,color:C.text}}>{titel}</div>
        <div style={{padding:"16px 18px"}}>{content}</div>
      </div>
    ))}
    <button onClick={sla} style={{padding:"9px 22px",border:"none",borderRadius:7,background:opgeslagen?C.green:C.orange,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:14,transition:"background .3s",display:"flex",alignItems:"center",gap:7}}>
      {opgeslagen&&<Ico d={IC.check} size={14} color="#fff"/>}{opgeslagen?"Opgeslagen!":"Opslaan"}
    </button>
  </div>);
}

// ══ ROOT ════════════════════════════════════════════════════════════════════
function App(){
  const[state,dispatch]=useReducer(reducer,INIT);
  const C=state.darkMode?D:L;
  const NAV=[
    {id:"dashboard",label:"Dashboard",icon:IC.home},
    {id:"rekeningen",label:"Rekeningen",icon:IC.rekeningen},
    {id:"budget",label:"Budget",icon:IC.budget},
    {id:"uitgaven",label:"Uitgaven",icon:IC.uitgaven},
    {id:"vastelasten",label:"Vaste Lasten",icon:IC.lasten},
    {id:"instellingen",label:"Instellingen",icon:IC.settings},
  ];
  const renderPage=()=>{
    const p={state,dispatch,C};
    switch(state.view){
      case"dashboard":return<PageDashboard {...p}/>;
      case"rekeningen":return<PageRekeningen {...p}/>;
      case"budget":return<PageBudget {...p}/>;
      case"uitgaven":return<PageUitgaven {...p}/>;
      case"vastelasten":return<PageVasteLasten {...p}/>;
      case"instellingen":return<PageInstellingen {...p}/>;
      default:return<PageDashboard {...p}/>;
    }
  };
  return(<div style={{display:"flex",height:"100vh",background:C.bg,color:C.text,fontFamily:"'DM Sans',sans-serif",overflow:"hidden",transition:"background .2s,color .2s"}}>
    {/* Sidebar */}
    <div style={{width:210,background:C.sidebar,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",flexShrink:0,transition:"background .2s"}}>
      <div style={{padding:"16px 14px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
        <div style={{background:C.orange,borderRadius:7,width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <Ico d={IC.bolt} size={13} color="#fff"/>
        </div>
        <span style={{fontWeight:700,fontSize:15,color:C.text}}>MijnFinanciën</span>
      </div>
      <div style={{padding:"11px 13px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:30,height:30,borderRadius:"50%",background:C.orange,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:11,flexShrink:0}}>AJ</div>
        <div>
          <div style={{fontWeight:600,fontSize:12,color:C.text}}>Anthony</div>
          <div style={{fontSize:10,color:C.muted}}>Persoonlijk</div>
        </div>
      </div>
      <nav style={{flex:1,padding:"7px",overflowY:"auto"}}>
        {NAV.map(n=>{
          const active=n.id===state.view;
          return(<div key={n.id} onClick={()=>dispatch({type:"SET_VIEW",view:n.id})}
            style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:7,cursor:"pointer",marginBottom:1,
              borderLeft:active?`3px solid ${C.orange}`:"3px solid transparent",
              background:active?C.navActive:"transparent",color:active?C.orange:C.muted,
              fontWeight:active?600:400,fontSize:13,transition:"all .15s"}}
            onMouseEnter={e=>{if(!active)e.currentTarget.style.background=C.hover;}}
            onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent";}}>
            <Ico d={n.icon} size={15} color={active?C.orange:C.muted}/>
            {n.label}
          </div>);
        })}
      </nav>
      <div style={{padding:"11px 13px",borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.muted}}>
          <Ico d={state.darkMode?IC.sun:IC.moon} size={13} color={C.muted}/>
          {state.darkMode?"Licht":"Donker"}
        </div>
        <div onClick={()=>dispatch({type:"TOGGLE_DARK"})} style={{width:34,height:19,borderRadius:99,background:state.darkMode?C.orange:"#D1D5DB",cursor:"pointer",position:"relative",transition:"background .2s"}}>
          <div style={{width:13,height:13,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:state.darkMode?18:3,transition:"left .2s"}}/>
        </div>
      </div>
    </div>
    {/* Main */}
    <div style={{flex:1,overflow:"auto"}}>
      <div style={{padding:"22px 26px",minHeight:"100%"}}>{renderPage()}</div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
